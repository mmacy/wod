name: Deploy WOD Viewer to Pages

on:
  # Refresh the snapshot once a day. 13:00 UTC = 06:00 PDT / 05:00 PST.
  schedule:
    - cron: "0 13 * * *"
  # Rebuild on every push to main that touches the site or build pipeline.
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "static/**"
      - "scripts/fetch_wod.py"
      - "app.py"
      - ".github/workflows/deploy-pages.yml"
  # Manual button in the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow at most one Pages deploy in flight; queue newer ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        # Pinned by SHA for supply-chain safety. Comments track the
        # human-readable version. Dependabot keeps these current.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site/static site/data
          cp templates/index.html site/index.html
          cp -R static/. site/static/

      - name: Fetch weekly WOD snapshot
        run: python3 scripts/fetch_wod.py --out site/data/wod.json

      - name: Show snapshot summary
        run: |
          echo "Snapshot size: $(wc -c < site/data/wod.json) bytes"
          python3 -c "
          import json
          d = json.load(open('site/data/wod.json'))
          print('schema:', d.get('schema'))
          print('generatedAt:', d.get('generatedAt'))
          print('weeks:', d.get('weekStarts'))
          "

      - name: Compare snapshot vs published (skip deploy when unchanged)
        id: compare
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          PAGES_URL=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq .html_url 2>/dev/null)
          if [ -z "$PAGES_URL" ]; then
            echo "Pages not configured yet — will deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SNAPSHOT_URL="${PAGES_URL%/}/data/wod.json?ts=$(date +%s)"
          echo "Comparing against $SNAPSHOT_URL"
          curl -fsSL --max-time 30 "$SNAPSHOT_URL" -o /tmp/published.json
          curl_rc=$?
          if [ $curl_rc -ne 0 ]; then
            echo "Could not fetch published snapshot (curl rc=$curl_rc) — will deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/compare_snapshot.py site/data/wod.json /tmp/published.json
          cmp_rc=$?
          if [ $cmp_rc -eq 0 ]; then
            echo "::notice::WOD content unchanged from published snapshot — skipping Pages deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "WOD content differs (compare rc=$cmp_rc) — will deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.compare.outputs.should_deploy != 'false'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        if: steps.compare.outputs.should_deploy != 'false'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.compare.outputs.should_deploy != 'false'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
